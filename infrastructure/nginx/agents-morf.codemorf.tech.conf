# Staging public entry for Agents Morf v0.2 (parallel to agent.codemorf.tech).
# Install on aaPanel host:
#   /www/server/panel/vhost/nginx/agents-morf.codemorf.tech.conf
# DNS (Cloudflare): CNAME or A for agents-morf.codemorf.tech → same as agent.codemorf.tech
# SSL: Cloudflare Origin CA already covers *.codemorf.tech

server
{
    listen 80;
    listen 443 ssl;
    listen 443 quic;
    listen [::]:443 ssl;
    listen [::]:443 quic;
    http2 on;
    http3 on;
    listen [::]:80;
    server_name agents-morf.codemorf.tech;

    if ($server_port !~ 443){
        rewrite ^(/.*)$ https://$host$1 permanent;
    }

    ssl_certificate    /www/server/panel/vhost/cert/agent.codemorf.tech/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/agent.codemorf.tech/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    add_header Strict-Transport-Security "max-age=31536000";
    add_header X-Staging-App "agents-morf-v02" always;
    error_page 497 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_buffering off;
        client_max_body_size 25m;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:18080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
        proxy_cache off;
        add_header Cache-Control "no-store" always;
        client_max_body_size 25m;
    }

    access_log  /www/wwwlogs/agents-morf.codemorf.tech.log;
    error_log   /www/wwwlogs/agents-morf.codemorf.tech.error.log;
}
