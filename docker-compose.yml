services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agents_morf}
      POSTGRES_USER: ${POSTGRES_USER:-agents_morf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agents_morf} -d ${POSTGRES_DB:-agents_morf}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [internal]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [internal]

  qdrant:
    image: qdrant/qdrant:v1.12.6
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [internal]

  backend:
    build:
      context: ./apps/backend
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://agents_morf:CHANGE_ME@postgres:5432/agents_morf}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-http://ollama:11434}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - uploads_data:/app/storage/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 20s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [internal]

  worker:
    build:
      context: ./apps/backend
    command: ["python", "-m", "app.worker"]
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://agents_morf:CHANGE_ME@postgres:5432/agents_morf}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-http://ollama:11434}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    networks: [internal]

  frontend-build:
    build:
      context: ./apps/frontend
      target: export
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    volumes:
      - frontend_dist:/output
    restart: "no"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      backend:
        condition: service_healthy
      frontend-build:
        condition: service_completed_successfully
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 20s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [internal]

  ollama:
    image: ollama/ollama:latest
    profiles: ["local-ai"]
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks: [internal]

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  uploads_data:
  frontend_dist:
  ollama_data:

networks:
  internal:
    driver: bridge
